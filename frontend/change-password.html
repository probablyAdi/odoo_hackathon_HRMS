<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set New Password · HRMS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;650;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="centered-shell">
    <div class="auth-card">
      <div class="brand-row">
        <div class="brand-mark">HR</div>
        <div>
          <div class="brand-name">HRMS</div>
        </div>
      </div>
      <h1 class="page-title">Set a new password</h1>
      <p class="subtitle">You're using a system-generated password. Set your own before continuing.</p>

      <div class="banner" id="banner"></div>

      <form id="pwForm" novalidate>
        <div class="field">
          <label for="oldPassword">Current (temporary) password</label>
          <input type="password" id="oldPassword" required>
        </div>
        <div class="field">
          <label for="newPassword">New password</label>
          <input type="password" id="newPassword" required>
          <p class="helper-text">Must be 8+ characters, with at least one uppercase letter and one number.</p>
        </div>
        <button type="submit" class="btn btn-primary" id="submitBtn">Update Password</button>
      </form>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    Auth.requireLogin();
    const form = document.getElementById("pwForm");
    const banner = document.getElementById("banner");
    const submitBtn = document.getElementById("submitBtn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      hideBanner(banner);
      const old_password = document.getElementById("oldPassword").value;
      const new_password = document.getElementById("newPassword").value;

      if (!(new_password.length >= 8 && /[A-Z]/.test(new_password) && /[0-9]/.test(new_password))) {
        showBanner(banner, "New password must be 8+ characters with an uppercase letter and a number.", "error");
        return;
      }

      submitBtn.disabled = true;
      try {
        await api.post("/api/auth/change-password", { old_password, new_password });
        const session = Auth.getSession();
        session.must_change_password = false;
        localStorage.setItem("hrms_session", JSON.stringify(session));
        toast("Password updated.", "success");
        window.location.href = "dashboard.html";
      } catch (err) {
        showBanner(banner, err.message, "error");
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
